name: Benchmarks

on:
    push:
        branches: ["main"]
        paths:
            - "fusionsnake/src/**"
            - "fusionsnake/benches/**"
            - "fusionsnake/Cargo.toml"
            - "Cargo.toml"
            - "Cargo.lock"
            - "rust-toolchain.toml"

permissions:
    contents: write
    deployments: write

jobs:
    benchmark:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy

            - name: Cache cargo registry & build
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: bench-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: bench-${{ runner.os }}-

            - name: Run benchmarks
              run: cargo bench --workspace --bench '*' -- --output-format json | tee bench-output.json

            - name: Publish benchmark results
              uses: benchmark-action/github-action-benchmark@v1
              with:
                  name: FusionSnake Benchmarks
                  tool: cargo
                  output-file-path: bench-output.json
                  gh-pages-branch: gh-pages
                  benchmark-data-dir-path: bench
                  auto-push: true
                  github-token: ${{ secrets.GITHUB_TOKEN }}
