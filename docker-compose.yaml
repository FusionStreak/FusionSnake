services:
  snek:
    image: ghcr.io/fusionstreak/fusionsnake:latest
    container_name: snek
    command: bash -c "fusion-snake"
    ports:
      - 6666:6666
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./data:/data # Persist game stats across restarts
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - DATABASE_URL=sqlite:/data/fusion_snake.db
      - API_KEY=${API_KEY:-}
      - TRAINER_URL=http://snake-trainer:5050

  trainer:
    image: ghcr.io/fusionstreak/fusionsnake-trainer:latest
    container_name: snake-trainer
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./data:/data
    environment:
      - SNAKE_URL=http://snek:6666
      - API_KEY=${API_KEY:-}
      - REPORTS_DIR=/data/reports
      - CACHE_DIR=/data/trainer_cache
      - MIN_TRAINING_ROWS=500
      - MIN_IMPROVEMENT=0.02
      - N_TRIALS=200
      - TRAINER_PORT=5050
    restart: unless-stopped
