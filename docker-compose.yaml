services:
  snek:
    image: ghcr.io/fusionstreak/fusionsnake:latest
    container_name: snek
    command: bash -c "fusion-snake"
    ports:
      - 6666:6666
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./data:/data # Persist game stats across restarts
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - DATABASE_URL=sqlite:/data/fusion_snake.db
      - API_KEY=${API_KEY:-}
